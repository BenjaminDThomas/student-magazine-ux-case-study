<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Magazine Articles</title>
    <script src="js/theme-init.js"></script>
    <!-- CSS Styles File-->
    <link rel="stylesheet" href="css/style.css">
    <!-- CSS Grid File-->
    <link rel="stylesheet" href="css/grid.css">
</head>
<body>
    <div class="page-grid">
    <!-- Header -->
    <header>
        <h1 class="logo">
            <span class="logo-sm">S M</span>
            <span class="logo-word-cycle">
                <span class="lw">N<span class="lw-expand">EWS</span></span>
                <span class="lw">D<span class="lw-expand">ISCOVER</span></span>
                <span class="lw">S<span class="lw-expand">OCIALISE</span></span>
            </span>
        </h1>
        <!-- Theme Toggle -->
        <button class="theme-toggle" title="Toggle theme">
            <span class="visually-hidden">Toggle theme</span>
            <span class="toggle-track">
                <span class="toggle-thumb"></span>
            </span>
        </button>
    </header>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="viewall.html">News</a></li>
            <li><a href="#site-footer">Contact</a></li>
        </ul>
        <!-- Navigation Bar Icons -->
        <div class="navbar-icons">
            <a href="login.html" class="icon-btn" title="Saved articles">
                <img src="images/save_articles_logo.png" alt="Saved articles" class="heart-icon"/>
            </a>
            <a href="login.html" class="icon-btn" title="Profile">
                <img src="images/profile_picture_image.png" alt="Profile" class="profile-icon"/>
            </a>
        </div>
    </nav>
    <!-- Article Header Container -->
    <article class="article-header-wrap">
        <!-- Top Page Divider -->
        <hr class="header-line top">
        <!-- Header -->
        <header class="article-header">
            <hgroup class="header-left">
                <!-- Article Title -->
                <h1 id="article-title"></h1>
                <!-- Article Author -->
                <p id="article-author"></p>
            </hgroup>
            <!-- Return Button -->
            <a class="return-btn" href="viewall.html">Return →</a>
        </header>
        <!-- Bottom Page Divider-->
        <hr class="header-line bottom">
    </article>
    <!-- Article Content -->
    <section id="article-content"></section>
    <hr class="header-line bottom article-bottom-line">
    <!-- Scroll To Top Button -->
    <button id="scrollTopBtn" title="Scroll to top">Scroll to Top</button>
    <!-- Content Blur -->
    <div class="bottom-blur" aria-hidden="true"></div>
    </div>
    <!-- Footer -->
    <footer class="site-footer" id="site-footer">
        <nav class="footer-nav" aria-label="Footer">
            <p class="footer-animated-logo">
                <span class="footer-sm">S M</span>
                <span class="footer-word-cycle">
                    <span class="fw">N<span class="fw-expand">EWS</span></span>
                    <span class="fw">D<span class="fw-expand">ISCOVER</span></span>
                    <span class="fw">S<span class="fw-expand">OCIALISE</span></span>
                </span>
            </p>
            <details class="footer-group">
                <summary>Get Started</summary>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="login.html">Sign In</a></li>
                    <li><a href="register.html">Register</a></li>
                </ul>
            </details>
            <details class="footer-group">
                <summary>Discover</summary>
                <ul>
                    <li><a href="viewall.html">All Articles</a></li>
                    <li><a href="#">About Us</a></li>
                </ul>
            </details>
            <details class="footer-group">
                <summary>Contact</summary>
                <ul>
                    <li><a href="#">Get in touch</a></li>
                </ul>
            </details>
        </nav>
        <hr class="footer-divider">
        <p class="footer-touch">Get in touch</p>
        <p class="footer-socials-label">Socials</p>
        <ul class="footer-socials">
            <li><a href="#" title="Facebook">f</a></li>
            <li><a href="#" title="Instagram">ig</a></li>
            <li><a href="#" title="LinkedIn">in</a></li>
        </ul>
        <p class="footer-copyright">
            <span class="footer-sm-small">SM</span>
            Student Magazine 2026
        </p>
    </footer>
    <!-- JavaScript File-->
    <script src="js/theme-toggle.js"></script>
    <script src="js/logo-cycle.js"></script>
    <script src="js/article.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
