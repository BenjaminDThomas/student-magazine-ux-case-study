<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for a Student Magazine account to save articles and personalize your experience.">
    <title>Student Magazine - Register</title>
    <script src="js/theme-init.js"></script>
    <!-- CSS Styles File-->
    <link rel="stylesheet" href="css/bundle.css">
    <link rel="stylesheet" href="css/subgrid.css">
</head>
<body class="auth">
    <!-- Close Overlay Topbar -->
    <header class="auth-topbar">
        <a class="auth-close" href="index.html" title="Close">&times;</a>
    </header>
    <main id="main-content" class="auth-modal" tabindex="-1">
        <!-- Email Step -->
        <section class="auth-step" data-step="reg-email">
            <h1>Create account</h1>
            <label class="auth-label" for="regEmail">Email</label>
            <input id="regEmail" type="email" placeholder="Enter your email..." autocomplete="email">
            <div class="auth-links">
                <!-- Already have account -->
                <a href="login.html">Already have an account?</a>
            </div>
            <!-- Next Section -->
            <button id="regEmailNext" class="auth-btn" disabled>Next</button>
        </section>
        <!-- Password Step -->
        <section class="auth-step" data-step="reg-password" hidden>
            <h1>Create a password</h1>
            <p class="auth-subtext">At least 6 characters.</p>
            <label class="auth-label" for="regPassword">Password</label>
            <div class="pw-wrap">
                <input id="regPassword" type="password" placeholder="Create a password..." autocomplete="new-password">
                <!-- Show Password -->
                <button type="button" id="toggleRegPw" class="pw-toggle" title="Toggle password visibility">Show</button>
            </div>
            <!-- Create Account -->
            <button id="createBtn" class="auth-btn" disabled>Create account</button>
        </section>
    </main>
    <!-- JavaScript File-->
    <script src="js/theme-toggle.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
